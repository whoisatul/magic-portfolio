p\":\"balance\"},\"children\":\"Projects – Hrikshesh Kumar\"},\"$3a\",\"$3b\",1]\n3c:D{\"time\":3.3239170000015292}\n3c:D\"$3d\"\n3c:D{\"time\":4.986334000001079}\n41:T1004,"])</script><script>self.__next_f.push([1,"\r\n## Overview\r\n\r\nSecurioX is a **privacy-first AI document vault** designed to bridge the gap between **secure cloud storage and intelligent AI document analysis**. Traditional AI tools require users to upload raw documents to external systems, sacrificing privacy for convenience. SecurioX solves this by implementing a **zero-knowledge architecture** where files are encrypted client-side before being uploaded, ensuring that even the server cannot access the original content.\r\n\r\nThe platform combines **end-to-end encryption with Retrieval-Augmented Generation (RAG)** to allow users to securely interact with their documents through natural language queries. Users can upload files such as PDFs or DOCX documents, and the system extracts semantic information, generates embeddings, and enables intelligent conversations with those documents without compromising data security.\r\n\r\n## Key Features\r\n\r\n- **Zero-Knowledge File Storage**  \r\n  Files are encrypted on the client using AES before upload. The AES key itself is encrypted using the user's RSA public key, ensuring the server never sees the original content.\r\n\r\n- **AI-Powered Document Chat (RAG)**  \r\n  The system extracts text from uploaded documents, generates embeddings, and stores them in a vector database to enable semantic search and context-aware AI responses.\r\n\r\n- **Hybrid Cryptography Architecture**  \r\n  Combines **RSA asymmetric encryption with AES symmetric encryption** to provide strong security while maintaining performance for large file uploads.\r\n\r\n- **Multi-Factor Authentication (MFA)**  \r\n  Implements **TOTP-based authentication** to protect user accounts against brute-force attacks and credential theft.\r\n\r\n- **Semantic Retrieval Engine**  \r\n  Uses vector similarity search to retrieve only the most relevant document chunks before sending context to the LLM for generation.\r\n\r\n## Technologies Used\r\n\r\n- **Next.js \u0026 React** – Full-stack application architecture with dynamic UI rendering  \r\n- **PostgreSQL \u0026 Prisma** – Type-safe relational database and ORM  \r\n- **Tailwind CSS** – Responsive UI styling  \r\n- **NextAuth.js** – Authentication and session management  \r\n- **LangChain** – Orchestrating the RAG pipeline and document chunking  \r\n- **Pinecone** – Vector database for semantic search  \r\n- **Groq AI Inference** – High-performance LLM inference using models like `gpt-oss-120b` and `llama-3.3-70b`  \r\n- **Gemini Embeddings** – Generating semantic embeddings for document retrieval  \r\n- **Cloudinary** – Storage for encrypted document blobs  \r\n- **pdfjs-dist \u0026 Mammoth** – Extracting text from PDFs and Word documents  \r\n- **crypto-js, bcryptjs, jsencrypt** – Implementing hybrid encryption and password security\r\n\r\n## Challenges and Learnings\r\n\r\nOne of the biggest challenges was building a **secure end-to-end encrypted workflow while maintaining AI usability**. Managing cryptographic key flows between the browser and server required careful architecture to ensure private keys never leaked or became accessible outside the user's control.\r\n\r\nAnother challenge was designing an efficient **RAG pipeline** that could process multiple document types while maintaining high retrieval accuracy. Optimizing chunking strategies and embedding workflows was critical to ensure that the AI assistant retrieved the correct contextual information from documents.\r\n\r\nThis project also required solving complex **state management problems for encryption keys, file metadata, and AI chat sessions** within a full-stack Next.js environment.\r\n\r\n## Outcome\r\n\r\nSecurioX demonstrates how **privacy and AI intelligence can coexist** without compromising security. By combining **client-side cryptography, semantic vector search, and modern LLM pipelines**, the system enables users to securely analyze and interact with their personal documents.\r\n\r\nThe platform showcases expertise in **AI engineering, secure system design, and full-stack development**, highlighting how modern web technologies can be combined with advanced AI infrastructure to build privacy-preserving intelligent applications."])</script><script>self.__next_f.push([1,"3c:[\"$\",\"$L34\",null,{\"fillWidth\":true,\"gap\":\"xl\",\"marginBottom\":\"40\",\"paddingX\":\"l\",\"children\":[[\"$\",\"$L40\",\"csecuriox-zero-knowledge-ai-document-vault\",{\"priority\":true,\"href\":\"/work/csecuriox-zero-knowledge-ai-document-vault\",\"images\":[\"/images/projects/project-01/w1a.png\",\"/images/projects/project-01/w1b.png\"],\"title\":\"SecurioX: Zero-Knowledge AI Document Vault\",\"description\":\"A privacy-first AI document vault that combines end-to-end encryption with Retrieval-Augmented Generation, allowing users to securely chat with their private documents without exposing raw data.\",\"content\":\"$41\",\"avatars\":[{\"src\":\"/images/avatar.png\"}],\"link\":\"https://securiox-ai.vercel.app\"},\"$3d\",\"$3f\",0],\"$L42\",\"$L43\",\"$L44\"]},\"$3d\",\"$3e\",1]\n2f:[\"$\",\"$L34\",null,{\"maxWidth\":\"m\",\"paddingTop\":\"24\",\"children\":[\"$35\",\"$39\",\"$3c\"]},\"$30\",\"$33\",1]\n45:D{\"time\":5.455584000003}\n45:D\"$46\"\n45:D{\"time\":6.418917000002693}\n45:[\"$\",\"$L48\",null,{\"children\":[\"$\",\"$4a\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@4b\"},\"$46\",\"$49\",1]},\"$46\",\"$47\",1]\n4d:D{\"time\":6.691917000003741}\n4d:D\"$4e\"\n4d:D{\"time\":6.6979170000049635}\n4d:null\n50:D{\"time\":6.732250000000931}\n50:D\"$51\"\n50:D{\"time\":6.764584000004106}\n54:D{\"time\":6.800542000004498}\n54:D\"$55\"\n50:[\"$\",\"$L53\",null,{\"children\":\"$L54\"},\"$51\",\"$52\",1]\n56:D{\"time\":7.0263340000019525}\n56:D\"$57\"\n56:D{\"time\":7.072125000006054}\n5c:D{\"time\":7 atform combines **medical imaging AI with an interactive web interface**, enabling real-time predictions and visual overlays that highlight tumor regions.\n\nThis project demonstrates the integration of **deep learning research, medical image processing, and modern web technologies** into a deployable AI application.\n\n## Key Features\n\n- **Automated Tumor Segmentation**  \n  Uses a trained U-Net model to identify tumor pixels in MRI scans and generate precise segmentation masks.\n\n- **Real-Time Prediction Interface**  \n  Users can upload MRI slices and instantly visualize segmentation overlays generated by the deep learning model.\n\n- **High-Accuracy Medical AI Model**  \n  Achieves strong segmentation performance using a hybrid **Dice Loss + Binary Crossentropy loss function** optimized for highly imbalanced medical datasets.\n\n- **Interactive Visualization**  \n  Displays prediction outputs and segmentation masks through an intuitive web interface, helping users easily interpret model predictions.\n\n- **Efficient Lightweight Architecture**  \n  The optimized U-Net architecture balances accuracy and performance, enabling fast inference even on limited hardware.\n\n## Technologies Used\n\n### Frontend\n- **Next.js \u0026 React** – Interactive user interface and routing  \n- **Tailwind CSS** – Responsive styling  \n- **Framer Motion** – Smooth UI animations  \n- **Recharts** – Visualization of performance metrics\n\n### Backend \u0026 AI\n- **Python \u0026 FastAPI** – High-performance asynchronous backend API  \n- **TensorFlow / Keras** – Deep learning framework for building the U-Net model  \n- **OpenCV \u0026 Nibabel** – MRI image preprocessing and alignment  \n- **NumPy \u0026 Scikit-learn** – Data processing and normalization\n\n## Dataset\n\nThe model was trained using the **RSNA-ASNR-MICCAI BraTS 2021 dataset**, a widely used benchmark for brain tumor segmentation research.\n\n- Utilized **FLAIR MRI modality**, which highlights tumor-related edema by suppressing cerebrospinal fluid signals.\n- Dataset contains **1,251 patient cases** producing **48,000+ MRI slices**.\n- Non-informative slices were filtered to improve training quality and reduce dataset bias.\n\n## Model Architecture\n\nThe system implements a **lightweight U-Net convolutional neural network** designed for high segmentation accuracy with efficient computation.\n\n- **Input Shape:** 128×128 grayscale MRI slices  \n- **Encoder:** Progressive feature extraction layers with filters 32 → 64 → 128  \n- **Bottleneck:** Dense feature representation with 256 filters  \n- **Decoder:** Upsampling layers with skip connections restoring spatial information  \n- **Output:** Sigmoid activation generating binary tumor segmentation masks\n\nThe architecture contains approximately **7.8 million parameters**, allowing fast inference while preserving spatial accuracy.\n\n## Challenges and Learnings\n\nOne of the main challenges was addressing the **extreme class imbalance in medical imaging datasets**, where tumor regions occupy only a small percentage of total pixels. To overcome this, a hybrid **Dice Loss and Binary Crossentropy loss function** was implemented, significantly improving segmentation accuracy.\n\nAnother key challenge involved **preprocessing complex MRI volumes**, including normalization, slice extraction, and resizing while preserving clinically relevant information.\n\nThis project also provided valuable experience in **deploying deep learning models within a full-stack application**, connecting a TensorFlow inference backend with a modern Next.js frontend.\n\n## Outcome\n\nAfter training for 30 epochs on GPU infrastructure, the model achieved a **validation Dice score of 93.74%**, demonstrating strong performance in detecting tumor boundaries and segmentation regions.\n\nNeuroVisionAI showcases how **deep learning, medical imaging, and modern web development** can be combined to create an interactive AI system capable of assisting with complex medical image analysis."])</script><script>self.__next_f.push([1,"42:[\"$\",\"$L40\",\"neurovisionai-deep-learning-brain-tumor-segmentation\",{\"priority\":true,\"href\":\"/work/neurovisionai-deep-learning-brain-tumor-segmentation\",\"images\":[\"/images/projects/project-01/w2a.png\",\"/images/projects/project-01/w2b.png\"],\"title\":\"NeuroVisionAI: Deep Learning Brain Tumor Segmentation\",\"description\":\"A deep learning-powered medical imaging platform that segments brain tumors from MRI scans using a U-Net architecture and provides real-time visualization through an interactive web interface.\",\"content\":\"$63\",\"avatars\":[{\"src\":\"/images/avatar.png\"}],\"link\":\"https://neuro-vision-ai-1.vercel.app\"},\"$3d\",\"$62\",0]\n43:D{\"time\":7.607542000005196}\n65:T129d,"])</script><script>self.__next_f.push([1,"\n## Overview\n\nAI-FinAnalyst-Pro is an **AI-driven financial analysis platform** designed to help investors interpret complex financial data and make informed investment decisions. The system acts as a **virtual financial analyst**, combining real-time market data, financial news, and AI-powered reasoning to generate structured insights for any given stock ticker.\n\nThe application integrates **agent-based workflows using LangGraph**, enabling multiple AI agents to collaborate in analyzing market conditions, assessing risk, and generating investment insights. By combining deterministic financial data with large language models, the platform produces **data-grounded financial reports instead of speculative AI responses**.\n\nBuilt as a full-stack application using **Next.js, PostgreSQL, and modern AI tooling**, the platform provides an interactive dashboard where users can analyze stocks, track portfolios, and generate professional financial reports.\n\n## Key Features\n\n- **AI-Powered Financial Analysis**  \n  Generates structured investment insights by combining real-time market data with AI reasoning models.\n\n- **Multi-Agent AI Workflow**  \n  Uses LangGraph to orchestrate multiple AI agents that analyze financial metrics, evaluate news sentiment, and assess market risks.\n\n- **Real-Time Market Data Integration**  \n  Fetches live stock information including price movements, P/E ratios, beta values, and historical performance.\n\n- **Portfolio Tracking Dashboard**  \n  Allows users to manage their personal stock portfolio and track performance through interactive charts.\n\n- **Automated Financial Report Generation**  \n  Produces downloadable PDF reports summarizing market insights and portfolio analysis.\n\n## Technologies Used\n\n### Frontend\n- **Next.js \u0026 React** – Full-stack application framework  \n- **Tailwind CSS \u0026 Framer Motion** – Responsive styling and UI animations  \n- **Chart.js** – Interactive financial charts and data visualization\n\n### Backend \u0026 AI\n- **Prisma \u0026 PostgreSQL** – Database ORM and persistent data storage  \n- **LangChain \u0026 LangGraph** – Multi-agent AI orchestration and workflow management  \n- **Hugging Face Inference API** – LLM processing using models such as `deepseek-ai/DeepSeek-R1`  \n- **Yahoo Finance API (yahoo-finance2)** – Real-time financial market data  \n- **Duck-Duck-Scrape** – Web scraping for the latest financial news  \n- **pdf-lib** – Automated PDF report generation\n\n## AI Architecture\n\nThe platform utilizes an **agent-based AI architecture powered by LangGraph** to orchestrate multiple reasoning components.\n\n- **News Scout Agent** – Scrapes and aggregates recent financial news related to the selected ticker.  \n- **Financial Analyst Agent** – Interprets numerical data and news context to generate structured analysis.  \n- **Risk Manager Agent** – Evaluates volatility, potential downside risk, and market stability.\n\nThe agents operate within a **state graph pipeline**, where outputs from one agent become inputs for the next stage, enabling layered reasoning and structured financial insights.\n\n## Project Workflow\n\n1. The user enters a stock ticker on the web interface.  \n2. The backend retrieves real-time financial data using the Yahoo Finance API.  \n3. The LangGraph pipeline activates multiple AI agents to analyze market data and news.  \n4. The analysis results are stored in PostgreSQL through Prisma.  \n5. The frontend renders insights, charts, and reports dynamically.  \n6. Users can track portfolio holdings and generate downloadable PDF reports.\n\n## Challenges and Learnings\n\nOne of the key challenges was ensuring that **AI-generated financial insights remained grounded in real-time data**. This required designing a workflow where language models only interpret data retrieved from trusted sources rather than generating speculative outputs.\n\nAnother challenge involved building **multi-agent AI pipelines** that coordinate multiple reasoning steps while maintaining consistent context across agents. LangGraph proved particularly effective in orchestrating these workflows through state-based pipelines.\n\nThis project also provided hands-on experience integrating **LLM-based reasoning with real-world APIs and financial datasets**, bridging the gap between AI research and production-grade applications.\n\n## Outcome\n\nAI-FinAnalyst-Pro demonstrates how **agent-based AI systems can enhance financial decision-making** by combining structured market data with contextual intelligence from news and analytics.\n\nThe platform highlights expertise in **AI orchestration, full-stack development, real-time data pipelines, and interactive financial visualization**, showcasing how modern AI systems can transform complex financial data into actionable insights."])</script><script>self.__next_f.push([1,"43:[\"$\",\"$L40\",\"ofinanalyst-pro-ai-agentic-ai-financial-analysis-platform\",{\"priority\":false,\"href\":\"/work/ofinanalyst-pro-ai-agentic-ai-financial-analysis-platform\",\"images\":[\"/images/projects/project-01/w3a.png\",\"/images/projects/project-01/w3b.png\"],\"title\":\"AI-FinAnalyst-Pro: Agentic AI Financial Analysis Platform\",\"description\":\"An AI-powered financial analyst that combines real-time market data, news scraping, and multi-agent reasoning to generate comprehensive stock analysis and portfolio insights.\",\"content\":\"$65\",\"avatars\":[{\"src\":\"/images/avatar.png\"}],\"link\":\"https://ai-fin-analyst-pro.vercel.app\"},\"$3d\",\"$64\",0]\n44:D{\"time\":7.656500000004598}\n67:T1137,"])</script><script>self.__next_f.push([1,"\n## Overview\n\nThis project demonstrates **time series forecasting using Long Short-Term Memory (LSTM) neural networks**, a specialized architecture designed for sequential data. The model learns patterns from historical airline passenger data and predicts future passenger counts based on past observations.\n\nTime series forecasting is widely used in industries such as finance, transportation, and demand planning. Traditional regression models often struggle with temporal dependencies, but LSTM networks are designed to capture **long-term patterns and sequential relationships**, making them well suited for forecasting tasks.\n\nThis project walks through the complete pipeline of building a forecasting model—from **data preprocessing and sequence generation to model training, evaluation, and visualization of predictions**.\n\n## Key Features\n\n- **Sequential Time Series Modeling**  \n  Utilizes LSTM neural networks capable of learning long-term dependencies in temporal data.\n\n- **Data Preprocessing Pipeline**  \n  Includes normalization, time window generation, and reshaping of sequences to prepare data for deep learning models.\n\n- **Prediction and Evaluation**  \n  Forecasts future passenger counts and evaluates performance using regression metrics such as RMSE.\n\n- **Visualization of Model Performance**  \n  Graphical comparison of actual vs predicted values to illustrate forecasting accuracy.\n\n- **End-to-End Deep Learning Workflow**  \n  Covers the complete lifecycle of a machine learning project including preprocessing, model training, and performance analysis.\n\n## Technologies Used\n\n- **Python** – Core programming language for model development  \n- **NumPy \u0026 Pandas** – Data preprocessing and manipulation  \n- **Matplotlib** – Data visualization and result analysis  \n- **Scikit-learn** – Data normalization and evaluation metrics  \n- **TensorFlow / Keras** – Deep learning framework used to implement the LSTM architecture\n\n## Dataset\n\nThe model is trained on the **Airline Passenger Dataset**, a widely used benchmark dataset for time series forecasting.\n\n- Contains **monthly airline passenger counts**\n- Represents a **univariate time series dataset**\n- Useful for studying long-term seasonal patterns and growth trends\n\n## Project Workflow\n\n1. Load and preprocess the airline passenger dataset.  \n2. Normalize the data using **Min-Max scaling** to stabilize training.  \n3. Split the dataset into training and testing sets.  \n4. Convert time series data into a **supervised learning format** using sliding windows.  \n5. Reshape sequences to match the input structure required for LSTM networks.  \n6. Train the LSTM model on historical data.  \n7. Generate predictions on unseen test samples.  \n8. Evaluate performance using **Root Mean Squared Error (RMSE)**.  \n9. Visualize actual vs predicted passenger counts.\n\n## Model Architecture\n\nThe forecasting model uses a lightweight LSTM architecture designed for learning sequential dependencies:\n\n- **LSTM Layer:** 4 memory units to capture temporal patterns  \n- **Dense Output Layer:** Single neuron predicting the next value in the sequence  \n- **Loss Function:** Mean Squared Error (MSE)  \n- **Optimizer:** Adam optimizer for efficient training\n\n## Challenges and Learnings\n\nOne of the key challenges in time series forecasting is converting sequential data into a format suitable for neural networks. This required implementing **sliding windows that transform time series observations into supervised learning sequences**.\n\nAnother important lesson involved the **importance of normalization**, as neural networks are sensitive to scale differences in input data. Applying Min-Max scaling significantly improved training stability and prediction accuracy.\n\nThis project also provided deeper insights into **sequence modeling, temporal dependencies, and evaluation strategies for forecasting problems**.\n\n## Outcome\n\nThe trained LSTM model successfully captures the underlying trend and seasonal patterns in the airline passenger dataset. The predictions closely follow the actual passenger growth curve, demonstrating the effectiveness of LSTM networks for time series forecasting tasks.\n\nThis project highlights practical experience with **deep learning-based forecasting models, sequential data processing, and regression-based model evaluation**, forming a strong foundation for more advanced time series applications."])</script><script>self.__next_f.push([1,"44:[\"$\",\"$L40\",\"time-series-forecasting-with-lstm-neural-networks\",{\"priority\":false,\"href\":\"/work/time-series-forecasting-with-lstm-neural-networks\",\"images\":[\"/images/projects/project-01/w4a.png\"],\"title\":\"Time Series Forecasting with LSTM Neural Networks\",\"description\":\"A deep learning project demonstrating time series forecasting using LSTM networks to predict future airline passenger trends from historical data.\",\"content\":\"$67\",\"avatars\":[{\"src\":\"/images/avatar.png\"}],\"link\":\"https://github.com/whoisatul/Time-series-forecast-using-LSTM.git\"},\"$3d\",\"$66\",0]\n1e:D{\"time\":7.771500000002561}\n1e:D\"$68\"\n1e:D{\"time\":7.935667000005196}\n1e:D\"$6e\"\n1e:D{\"time\":8.006209000006493}\n72:T76b,"])</script><script>self.__next_f.push([1,"\n              (function() {\n                try {\n                  const root = document.documentElement;\n                  const defaultTheme = 'system';\n                  \n                  // Set defaults from
